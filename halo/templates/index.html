<!DOCTYPE html>
<html>
<head>
    <title>Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="mb-1">Halo, {{ nama }}!</h1>
            <a href="/logout/" class="btn btn-outline-danger">Logout</a>
        </div>
        <p class="text-muted">Kamu dari {{ kota }}.</p>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Daftar Produk</h2>
            <a href="/tambah/" class="btn btn-primary">+ Tambah Produk</a>
        </div>

        <table class="table table-bordered table-hover bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Nama</th>
                    <th>Stok</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                {% for item in produk %}
                <tr>
                    <td>{{ item.nama }}</td>
                    <td>{{ item.stok }}</td>
                    <td>Rp{{ item.harga }}</td>
                    <td>
                        <a href="/edit/{{ item.id }}/" class="btn btn-sm btn-warning">Edit</a>
                        <a href="/hapus/{{ item.id }}/" class="btn btn-sm btn-danger">Hapus</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
